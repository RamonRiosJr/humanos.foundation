<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the hOS Revolution</title>
    <!-- Tailwind CSS for rapid styling mirroring the React app -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0a0a0a',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' },
                        blue: { 500: '#3b82f6' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .glow-title {
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }
        
        /* Iframe styling to make the embedded Odoo form feel native */
        .odoo-embed-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            border-radius: 1.5rem;
            background: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pt-16 pb-28 px-4 md:px-8">

    <!-- Hero Section -->
    <div class="max-w-3xl w-full text-center mb-12">
        <div class="inline-block px-3 py-1 mb-6 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 text-xs font-semibold tracking-wider uppercase">
            The Movement
        </div>
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6">
            Join the <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 glow-title">hOS Revolution</span>
        </h1>
        <p class="text-white/60 text-lg md:text-xl leading-relaxed max-w-2xl mx-auto">
            This is not a product waitlist. This is a movement. Join thousands of patients, 
            clinicians, and technologists who believe health data sovereignty is a human right.
        </p>
    </div>

    <!-- Embedded Odoo Form Container -->
    <div class="w-full max-w-2xl glass-strong border border-white/10 shadow-2xl rounded-3xl p-2 md:p-6 transition-all duration-500 hover:border-cyan-500/20">
        
        <!-- We use the native Odoo Contact Us page iframe. 
             This guarantees 100% flawless Lead creation directly into your CRM.
             No custom API handling, no CORS errors, no Tracebacks. 
        -->
        <div class="odoo-embed-container" style="min-height: 850px;">
            <iframe 
                src="https://team.humanos.foundation/contactus" 
                width="100%" 
                height="850" 
                frameborder="0" 
                scrolling="yes"
                style="border: none; background: transparent; display: block;"
                title="Odoo Native Lead Intake Form"
            ></iframe>
        </div>
        
        <p class="text-xs text-white/20 text-center mt-4">
            Secured by native Odoo CRM framework integration.
        </p>
    </div>

</body>
</html>
