# Dependabot configuration
# Generated by gh-repo-bootstrap
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    target-branch: "master"
    open-pull-requests-limit: 10
    labels:
      - "type: chore"
      - "epic: infrastructure"
      - "P3: low"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "master"
    labels:
      - "type: chore"
      - "epic: infrastructure"
      - "P3: low"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
