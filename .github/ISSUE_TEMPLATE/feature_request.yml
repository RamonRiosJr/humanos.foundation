name: ✨ Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: ["type: feature", "P2: medium"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide enough detail to evaluate
        the request and plan implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? What user need does this address?
      placeholder: "As a [user type], I want [goal] so that [reason]."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: epic
    attributes:
      label: Epic / Track
      description: Which engineering track does this belong to?
      options:
        - Compliance
        - Security
        - Infrastructure
        - UI/UX
        - AI/ML
        - Integrations
        - Other
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Estimated Size
      description: How complex do you think this feature is?
      options:
        - S — A few hours
        - M — 1 day
        - L — 2-3 days
        - XL — Multiple days / needs breakdown
        - Unknown
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is complete? List testable criteria.
      placeholder: |
        - [ ] When I do X, Y happens
        - [ ] The feature is accessible (WCAG 2.1 AA)
        - [ ] Unit tests cover the new functionality
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to related issues, etc.
