name: 🐛 Bug Report
description: Report a reproducible bug or regression
title: "bug: "
labels: ["type: bug", "P2: medium"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug. Please fill out all fields
        to help us reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: What version or commit hash are you running?
      placeholder: "v1.2.3 or abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How severely does this affect you?
      options:
        - P0 — Critical / Production outage
        - P1 — High / Major functionality broken
        - P2 — Medium / Workaround exists
        - P3 — Low / Minor inconvenience
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, browser, Node.js version, etc."
      placeholder: |
        - OS: macOS 14.2
        - Browser: Chrome 121
        - Node: 20.11.0
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs that might help.
